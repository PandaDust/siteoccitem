<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCCITEM — Offres d'emploi (RH)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d1b2a;
  --card:    #0f2235;
  --accent:  #cc3517;
  --blue:    #104766;
  --text:    #ffffff;
  --muted:   #a0aec0;
  --border:  #1a3a5c;
  --focus:   #3a8fd4;
  --hover-bg: rgba(58,143,212,0.08);
  --focus-bg: rgba(58,143,212,0.13);
  --label-color: #4a7a9b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  padding-top: 60px;
  padding-bottom: 60px;
}

#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: #060f1a;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 100;
}
.topbar-title {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}
.topbar-title em {
  font-style: normal;
  color: var(--accent);
  font-weight: 700;
}

#btn-save {
  background: #0f2235;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s;
  white-space: nowrap;
}
#btn-save.dirty  { background: var(--accent); border-color: var(--accent); color: #fff; }
#btn-save.saved  { background: #1a4d30; border-color: #2a7a4a; color: #7fffbf; }
#btn-save.error  { background: #4d1a1a; border-color: #8a2a2a; color: #ffa0a0; }
#btn-save:disabled { opacity: 0.7; cursor: default; }

#editor-root {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.ed-section {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.ed-section-header {
  background: #0b1e30;
  padding: 9px 18px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ed-section-header::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 13px;
  background: var(--accent);
  border-radius: 2px;
  flex-shrink: 0;
}
.ed-section-body {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.ed-field { display: flex; flex-direction: column; gap: 3px; }
.ed-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--label-color);
  user-select: none;
}

.editable {
  color: var(--text);
  border-bottom: 1px solid var(--border);
  padding: 4px 6px;
  border-radius: 3px 3px 0 0;
  outline: none;
  cursor: text;
  transition: background 0.15s, border-color 0.15s;
  min-height: 30px;
  word-break: break-word;
}
.editable:hover  { background: var(--hover-bg); border-bottom-color: #2a5a8c; }
.editable:focus  { background: var(--focus-bg); border-bottom-color: var(--focus); }
.editable.multiline { white-space: pre-wrap; min-height: 80px; }
.editable.card-title { font-family: 'Exo 2', sans-serif; font-size: 19px; font-weight: 700; }
.editable.small { font-size: 13px; }
.editable.muted { color: var(--muted); }

.ed-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
@media (max-width: 700px) { .ed-grid-3 { grid-template-columns: 1fr; } }

.ed-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
}

.ed-card-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  position: absolute;
  top: 10px;
  right: 10px;
}
.ed-icon-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #0b1e30;
  color: var(--muted);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.ed-icon-btn:hover { border-color: var(--focus); color: var(--focus); }
.ed-icon-btn:disabled { opacity: 0.3; cursor: default; }
.ed-icon-btn.remove:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.ed-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.ed-toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.ed-toggle.is-inactive { color: #6a4a4a; }

.ed-note {
  font-size: 12px;
  color: var(--label-color);
  font-style: italic;
  padding: 4px 0;
}

.ed-richtoolbar {
  display: flex;
  gap: 4px;
}
.ed-rt-btn {
  width: 26px;
  height: 24px;
  border: 1px solid var(--border);
  background: #0b1e30;
  color: var(--muted);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.ed-rt-btn:hover { border-color: var(--focus); color: var(--focus); }
.ed-rt-btn[data-cmd="insertUnorderedList"] { width: auto; padding: 0 8px; font-size: 11px; }

.richtext p { margin-bottom: 0.6em; }
.richtext ul { padding-left: 1.2em; margin-bottom: 0.6em; }
.richtext li { margin-bottom: 0.2em; }

.btn-add {
  background: none;
  border: 1px dashed #2a5a8c;
  color: var(--label-color);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  align-self: flex-start;
}
.btn-add:hover { border-color: var(--focus); color: var(--focus); background: var(--hover-bg); }

.ed-error {
  padding: 48px 24px;
  text-align: center;
  color: var(--accent);
}
.ed-error p { margin-top: 8px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-title"><em>OCCITEM</em> — Offres d'emploi</div>
  <button id="btn-save" onclick="save()">Sauvegarder</button>
</div>

<div id="editor-root"></div>

<script>
'use strict';

let data = null;
let dirty = false;

function markDirty() {
  if (dirty) return;
  dirty = true;
  const btn = document.getElementById('btn-save');
  btn.textContent = '● Sauvegarder';
  btn.className = 'dirty';
}

function stripTags(html) {
  return html.replace(/<[^>]*>/g, '').trim();
}

async function save() {
  const empty = data.offers
    .map((o, i) => ({ o, i }))
    .filter(({ o }) => !o.title.trim() || !stripTags(o.description));
  if (empty.length) {
    const list = empty.map(({ o, i }) => `#${i + 1} "${o.title || '(sans titre)'}"`).join(', ');
    const ok = confirm(
      `Attention : ${list} — titre ou description vide.\n` +
      `Si tu viens de coller du texte et qu'il n'apparaît pas ci-dessus, ne sauvegarde pas : ` +
      `annule, recharge la page et recommence le collage.\n\nEnregistrer malgré tout ?`
    );
    if (!ok) return;
  }

  const btn = document.getElementById('btn-save');
  btn.textContent = '↻ En cours…';
  btn.className = '';
  btn.disabled = true;
  try {
    const r = await fetch('/api/save-careers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data, null, 2)
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'Erreur serveur');
    dirty = false;
    btn.textContent = '✓ Sauvegardé';
    btn.className = 'saved';
    setTimeout(() => { btn.textContent = 'Sauvegarder'; btn.className = ''; btn.disabled = false; }, 2200);
  } catch (e) {
    btn.textContent = '✗ ' + e.message;
    btn.className = 'error';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '● Sauvegarder'; btn.className = 'dirty'; }, 3500);
  }
}

function E(path, cls = '') {
  return `<div contenteditable="true" spellcheck="false" data-path="${path}" class="editable${cls ? ' ' + cls : ''}"></div>`;
}
function F(path, label, cls = '') {
  return `<div class="ed-field"><label class="ed-label">${label}</label>${E(path, cls)}</div>`;
}
function section(id, title, body) {
  return `<section class="ed-section" id="ed-${id}">
    <div class="ed-section-header">${title}</div>
    <div class="ed-section-body">${body}</div>
  </section>`;
}

// Champ riche : gras / italique / liste à puces, via execCommand.
// Le collage (Word, Google Docs...) est autorisé mais nettoyé : seuls gras/italique/listes/paragraphes
// sont conservés, tout le reste (polices, couleurs, tableaux, styles, scripts...) est retiré.
const RICHTEXT_BLOCK_TAGS = new Set(['P', 'DIV', 'UL', 'OL', 'LI', 'BR']);
const RICHTEXT_STRIP_TAGS = new Set(['SCRIPT', 'STYLE', 'HEAD', 'TITLE', 'META', 'LINK', 'NOSCRIPT', 'OBJECT', 'IFRAME', 'EMBED']);

function isBoldStyle(el) {
  const style = el.getAttribute('style') || '';
  if (/font-weight\s*:\s*(normal|[1-5]00)\b/i.test(style)) return false;
  if (/font-weight\s*:\s*(bold|bolder|[6-9]00)\b/i.test(style)) return true;
  return el.tagName === 'B' || el.tagName === 'STRONG';
}
function isItalicStyle(el) {
  const style = el.getAttribute('style') || '';
  if (/font-style\s*:\s*normal\b/i.test(style)) return false;
  if (/font-style\s*:\s*italic\b/i.test(style)) return true;
  return el.tagName === 'I' || el.tagName === 'EM';
}

// Déballe une balise non autorisée (span, font, table...) en réappliquant le gras/italique
// détecté sur son style inline ou son nom de balise — sinon Word/Google Docs (qui encodent
// souvent le gras via un <span style="font-weight:700"> plutôt qu'un <strong>) perdrait sa mise en forme.
function sanitizeRichText(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  (function clean(node) {
    Array.from(node.childNodes).forEach(child => {
      if (child.nodeType === Node.TEXT_NODE) return;
      if (child.nodeType !== Node.ELEMENT_NODE) { node.removeChild(child); return; }
      if (RICHTEXT_STRIP_TAGS.has(child.tagName)) { node.removeChild(child); return; }
      clean(child);
      if (RICHTEXT_BLOCK_TAGS.has(child.tagName)) {
        while (child.attributes.length) child.removeAttribute(child.attributes[0].name);
        return;
      }
      const bold = isBoldStyle(child);
      const italic = isItalicStyle(child);
      let frag = document.createDocumentFragment();
      while (child.firstChild) frag.appendChild(child.firstChild);
      if (italic) { const em = document.createElement('em'); em.appendChild(frag); frag = em; }
      if (bold) { const strong = document.createElement('strong'); strong.appendChild(frag); frag = strong; }
      node.insertBefore(frag, child);
      node.removeChild(child);
    });
  })(tmp);
  return tmp.innerHTML;
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Convertit l'ancien format texte brut (\n) en HTML la première fois qu'une offre est ouverte
function toRichHtml(text) {
  if (/<[a-z][\s\S]*>/i.test(text)) return text;
  return text.split(/\n{2,}/).map(p => p.trim()).filter(Boolean)
    .map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
}

function RichField(path, label) {
  return `<div class="ed-field">
    <label class="ed-label">${label}</label>
    <div class="ed-richtoolbar">
      <button type="button" class="ed-rt-btn" data-cmd="bold" title="Gras"><b>G</b></button>
      <button type="button" class="ed-rt-btn" data-cmd="italic" title="Italique"><i>I</i></button>
      <button type="button" class="ed-rt-btn" data-cmd="insertUnorderedList" title="Liste à puces">• Liste</button>
    </div>
    <div contenteditable="true" spellcheck="false" data-rich-path="${path}" class="editable multiline muted small richtext"></div>
  </div>`;
}

function getVal(path) {
  const keys = path.split('.');
  let obj = data;
  for (const k of keys) {
    if (obj == null) return '';
    obj = obj[isNaN(k) ? k : +k];
  }
  return obj ?? '';
}
function setVal(path, value) {
  const keys = path.split('.');
  let obj = data;
  for (let i = 0; i < keys.length - 1; i++) {
    obj = obj[isNaN(keys[i]) ? keys[i] : +keys[i]];
  }
  const last = keys[keys.length - 1];
  obj[isNaN(last) ? last : +last] = value;
  markDirty();
}

function renderSettings() {
  return section('settings', 'Réglages', `
    ${F('contact_email', 'email de contact pour les candidatures', 'small')}
    <p class="ed-note">Le bouton "Postuler" du site enverra les candidatures à cette adresse. S'il est vide, le bouton n'apparaît pas sur le site.</p>
  `);
}

function renderOffers() {
  const offers = data.offers;
  const cards = offers.map((o, i) => `
    <div class="ed-card">
      <div class="ed-card-toolbar">
        <button class="ed-icon-btn" onclick="moveOffer(${i}, -1)" ${i === 0 ? 'disabled' : ''} title="Monter">↑</button>
        <button class="ed-icon-btn" onclick="moveOffer(${i}, 1)" ${i === offers.length - 1 ? 'disabled' : ''} title="Descendre">↓</button>
        <button class="ed-icon-btn remove" onclick="removeOffer(${i})" title="Supprimer">×</button>
      </div>
      ${F(`offers.${i}.title`, 'intitulé du poste', 'card-title')}
      <div class="ed-grid-3">
        ${F(`offers.${i}.location`, 'lieu', 'small')}
        ${F(`offers.${i}.contract_type`, 'type de contrat', 'small')}
        ${F(`offers.${i}.date`, 'date de publication (AAAA-MM-JJ)', 'small')}
      </div>
      ${RichField(`offers.${i}.description`, 'description du poste')}
      <label class="ed-toggle${o.active ? '' : ' is-inactive'}">
        <input type="checkbox" ${o.active ? 'checked' : ''} onchange="toggleActive(${i}, this.checked)">
        ${o.active ? 'Offre publiée sur le site' : 'Offre masquée (non visible sur le site)'}
      </label>
    </div>`).join('');

  return section('offers', `Offres d'emploi (${offers.length})`, `
    ${cards}
    <button class="btn-add" onclick="addOffer()">+ Ajouter une offre</button>
  `);
}

function render() {
  const root = document.getElementById('editor-root');
  root.innerHTML = [renderSettings(), renderOffers()].join('');

  root.querySelectorAll('[data-path]').forEach(el => {
    el.innerText = String(getVal(el.dataset.path) ?? '');
  });
  root.querySelectorAll('[data-rich-path]').forEach(el => {
    el.innerHTML = toRichHtml(String(getVal(el.dataset.richPath) ?? ''));
  });

  root.querySelectorAll('[data-path]').forEach(el => {
    el.addEventListener('input', () => {
      let val = el.innerText;
      if (!el.classList.contains('multiline')) val = val.replace(/\n/g, '').trim();
      setVal(el.dataset.path, val);
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !el.classList.contains('multiline')) e.preventDefault();
    });
    el.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });

  root.querySelectorAll('[data-rich-path]').forEach(el => {
    el.addEventListener('input', () => {
      setVal(el.dataset.richPath, sanitizeRichText(el.innerHTML));
    });
    el.addEventListener('paste', e => {
      e.preventDefault();
      const cd = e.clipboardData || window.clipboardData;
      const html = cd.getData('text/html');
      if (html) {
        document.execCommand('insertHTML', false, sanitizeRichText(html));
      } else {
        document.execCommand('insertText', false, cd.getData('text/plain'));
      }
      setVal(el.dataset.richPath, sanitizeRichText(el.innerHTML));
    });
  });
}

// Barre d'outils des champs riches — délégué globalement (le DOM est recréé à chaque render())
document.addEventListener('mousedown', e => {
  const btn = e.target.closest('.ed-rt-btn');
  if (!btn) return;
  e.preventDefault();
  const target = btn.closest('.ed-field').querySelector('.richtext');
  if (!target) return;
  target.focus();
  document.execCommand(btn.dataset.cmd, false, null);
  setVal(target.dataset.richPath, sanitizeRichText(target.innerHTML));
});

function addOffer() {
  data.offers.push({
    title: '',
    location: '',
    contract_type: 'CDI',
    description: '',
    active: true,
    date: new Date().toISOString().slice(0, 10)
  });
  markDirty();
  render();
  const cards = document.querySelectorAll('#ed-offers .ed-card');
  if (cards.length) cards[cards.length - 1].querySelector('.editable').focus();
}

function removeOffer(i) {
  if (!confirm('Supprimer cette offre définitivement ?')) return;
  data.offers.splice(i, 1);
  markDirty();
  render();
}

function moveOffer(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= data.offers.length) return;
  [data.offers[i], data.offers[j]] = [data.offers[j], data.offers[i]];
  markDirty();
  render();
}

function toggleActive(i, checked) {
  data.offers[i].active = checked;
  markDirty();
  render();
}

async function init() {
  try {
    const r = await fetch('careers.json', { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
    render();
  } catch (e) {
    document.getElementById('editor-root').innerHTML = `
      <div class="ed-error">
        <strong>Impossible de charger careers.json</strong>
        <p>${e.message}</p>
        <p style="margin-top:16px">Assurez-vous de lancer <code>python editor_server.py</code><br>
        puis d'ouvrir <code>http://localhost:8081/career-admin.html</code></p>
      </div>`;
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
});

window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

init();
</script>
</body>
</html>
