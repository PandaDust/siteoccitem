<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCCITEM — Éditeur de contenu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d1b2a;
  --card:    #0f2235;
  --accent:  #cc3517;
  --blue:    #104766;
  --text:    #ffffff;
  --muted:   #a0aec0;
  --border:  #1a3a5c;
  --focus:   #3a8fd4;
  --hover-bg: rgba(58,143,212,0.08);
  --focus-bg: rgba(58,143,212,0.13);
  --label-color: #4a7a9b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  padding-top: 60px;
  padding-bottom: 60px;
}

/* ── Topbar ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: #060f1a;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 100;
}

.topbar-title {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}
.topbar-title em {
  font-style: normal;
  color: var(--accent);
  font-weight: 700;
}

.lang-btns {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.lang-btns button {
  background: none;
  border: none;
  color: var(--muted);
  padding: 6px 16px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  transition: background 0.15s, color 0.15s;
}
.lang-btns button.active {
  background: var(--blue);
  color: #fff;
}

#btn-save {
  background: #0f2235;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s;
  white-space: nowrap;
}
#btn-save.dirty  { background: var(--accent); border-color: var(--accent); color: #fff; }
#btn-save.saved  { background: #1a4d30; border-color: #2a7a4a; color: #7fffbf; }
#btn-save.error  { background: #4d1a1a; border-color: #8a2a2a; color: #ffa0a0; }
#btn-save:disabled { opacity: 0.7; cursor: default; }

/* ── Layout ── */
#editor-root {
  max-width: 980px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Section ── */
.ed-section {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.ed-section-header {
  background: #0b1e30;
  padding: 9px 18px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ed-section-header::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 13px;
  background: var(--accent);
  border-radius: 2px;
  flex-shrink: 0;
}

.ed-section-body {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Field ── */
.ed-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.ed-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--label-color);
  user-select: none;
}

/* ── Editable ── */
.editable {
  color: var(--text);
  border-bottom: 1px solid var(--border);
  padding: 4px 6px;
  border-radius: 3px 3px 0 0;
  outline: none;
  cursor: text;
  transition: background 0.15s, border-color 0.15s;
  min-height: 30px;
  word-break: break-word;
}
.editable:hover  { background: var(--hover-bg); border-bottom-color: #2a5a8c; }
.editable:focus  { background: var(--focus-bg); border-bottom-color: var(--focus); }

.editable.multiline  { white-space: pre-wrap; min-height: 56px; }
.editable.hero-text  { font-family: 'Exo 2', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.01em; }
.editable.sec-label  { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.editable.sec-title  { font-family: 'Exo 2', sans-serif; font-size: 21px; font-weight: 700; }
.editable.card-title { font-weight: 600; font-size: 15px; }
.editable.card-value { font-family: 'Exo 2', sans-serif; font-size: 30px; font-weight: 800; color: var(--accent); }
.editable.small      { font-size: 13px; }
.editable.muted      { color: var(--muted); }

/* ── Grids ── */
.ed-grid-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ed-grid-3   { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.ed-grid-nav { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }

@media (max-width: 700px) {
  .ed-grid-3   { grid-template-columns: 1fr; }
  .ed-grid-nav { grid-template-columns: repeat(4,1fr); }
}

/* ── Card ── */
.ed-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Tags ── */
.ed-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 2px 0;
}
.editable.tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 3px 12px;
  border: 1px solid #2a5a8c;
  border-radius: 20px;
  background: rgba(16,71,102,0.35);
  border-bottom: 1px solid #2a5a8c;
  min-width: 60px;
  min-height: auto;
}
.editable.tag:hover { background: rgba(16,71,102,0.55); border-bottom-color: #2a5a8c; }
.editable.tag:focus { background: rgba(58,143,212,0.18); border-bottom-color: var(--focus); }

/* ── Note ── */
.ed-note {
  font-size: 12px;
  color: var(--label-color);
  font-style: italic;
  padding: 4px 0;
}

.ed-tag-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.ed-tag-wrap .btn-remove-tag {
  display: none;
  position: absolute;
  top: -5px;
  right: -5px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  line-height: 1;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.ed-tag-wrap:hover .btn-remove-tag { display: flex; }

.btn-remove-card {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid #3a2020;
  background: #2a1010;
  color: var(--muted);
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
}
.ed-card:hover .btn-remove-card { opacity: 1; }
.btn-remove-card:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.btn-add {
  background: none;
  border: 1px dashed #2a5a8c;
  color: var(--label-color);
  padding: 3px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.btn-add:hover {
  border-color: var(--focus);
  color: var(--focus);
  background: var(--hover-bg);
}

/* ── Image field ── */
.ed-image {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
}
.ed-image-thumb {
  width: 88px;
  height: 66px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: #08141f;
  flex-shrink: 0;
  color: var(--label-color);
  font-size: 9px;
  text-align: center;
  overflow: hidden;
}
.ed-image-thumb--empty {
  border-style: dashed;
}
.ed-image-actions { display: flex; align-items: center; gap: 10px; }
.ed-image-status { font-size: 11px; color: var(--muted); }
.ed-image-status.ok  { color: #7fffbf; }
.ed-image-status.err { color: #ffa0a0; }

/* ── Error state ── */
.ed-error {
  padding: 48px 24px;
  text-align: center;
  color: var(--accent);
}
.ed-error p { margin-top: 8px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-title"><em>OCCITEM</em> — Éditeur de contenu</div>
  <div class="lang-btns">
    <button id="btn-fr" onclick="setLang('fr')">FR</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <button id="btn-save" onclick="save()">Sauvegarder</button>
</div>

<div id="editor-root"></div>

<script>
'use strict';

let data = null;
let lang = 'fr';
let dirty = false;

// ── Helpers ──────────────────────────────────────────────────────────────────

function getVal(path) {
  const [section, ...keys] = path.split('.');
  let obj = data[section][lang];
  for (const k of keys) {
    if (obj == null) return '';
    obj = obj[isNaN(k) ? k : +k];
  }
  return obj ?? '';
}

function setVal(path, value) {
  const [section, ...keys] = path.split('.');
  let obj = data[section][lang];
  for (let i = 0; i < keys.length - 1; i++) {
    obj = obj[isNaN(keys[i]) ? keys[i] : +keys[i]];
  }
  const last = keys[keys.length - 1];
  obj[isNaN(last) ? last : +last] = value;
  markDirty();
}

function markDirty() {
  if (dirty) return;
  dirty = true;
  const btn = document.getElementById('btn-save');
  btn.textContent = '● Sauvegarder';
  btn.className = 'dirty';
}

// ── Save ─────────────────────────────────────────────────────────────────────

async function save() {
  const btn = document.getElementById('btn-save');
  btn.textContent = '↻ En cours…';
  btn.className = '';
  btn.disabled = true;
  try {
    const r = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data, null, 2)
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'Erreur serveur');
    dirty = false;
    btn.textContent = '✓ Sauvegardé';
    btn.className = 'saved';
    setTimeout(() => { btn.textContent = 'Sauvegarder'; btn.className = ''; btn.disabled = false; }, 2200);
  } catch (e) {
    btn.textContent = '✗ ' + e.message;
    btn.className = 'error';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '● Sauvegarder'; btn.className = 'dirty'; }, 3500);
  }
}

// ── HTML builders ─────────────────────────────────────────────────────────────

// Placeholder for a contenteditable element; text is injected after DOM insertion
function E(path, cls = '') {
  return `<div contenteditable="true" spellcheck="false" data-path="${path}" class="editable${cls ? ' ' + cls : ''}"></div>`;
}

function F(path, label, cls = '') {
  return `<div class="ed-field"><label class="ed-label">${label}</label>${E(path, cls)}</div>`;
}

function section(id, title, body) {
  return `<section class="ed-section" id="ed-${id}">
    <div class="ed-section-header">${title}</div>
    <div class="ed-section-body">${body}</div>
  </section>`;
}

// Champ image : soit un chemin fixe (structurel), soit un chemin lu depuis content.json (jsonPath)
const imgVersions = {};
function bust(path) {
  return imgVersions[path] ? `${path}?v=${imgVersions[path]}` : path;
}

function ImgField(label, { target, jsonPath, note } = {}) {
  const attr = jsonPath ? `data-img-json-path="${jsonPath}"` : `data-target="${target}"`;
  const srcAttr = target ? `src="${bust(target)}"` : '';
  return `<div class="ed-field">
    <label class="ed-label">${label}</label>
    <div class="ed-image" ${attr}>
      <img class="ed-image-thumb" ${srcAttr} alt="Aucune image — cliquez sur Remplacer" onerror="this.classList.add('ed-image-thumb--empty')" onload="this.classList.remove('ed-image-thumb--empty')">
      <div class="ed-image-actions">
        <button type="button" class="btn-add" onclick="this.closest('.ed-image').querySelector('input[type=file]').click()">Remplacer</button>
        <span class="ed-image-status"></span>
      </div>
      <input type="file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="onImageFileChosen(event)">
    </div>
    ${note ? `<div class="ed-note" style="margin-top:2px">${note}</div>` : ''}
  </div>`;
}

async function onImageFileChosen(e) {
  const input = e.target;
  const wrapper = input.closest('.ed-image');
  const target = wrapper.dataset.target;
  const file = input.files[0];
  if (!file || !target) return;
  const statusEl = wrapper.querySelector('.ed-image-status');
  const imgEl = wrapper.querySelector('.ed-image-thumb');
  statusEl.textContent = '↻ envoi…';
  statusEl.className = 'ed-image-status';
  try {
    const r = await fetch(`/api/upload-image?target=${encodeURIComponent(target)}`, {
      method: 'POST',
      headers: { 'Content-Type': file.type || 'application/octet-stream' },
      body: file
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'Erreur serveur');
    imgVersions[target] = Date.now();
    imgEl.src = bust(target);
    statusEl.textContent = '✓ remplacée';
    statusEl.className = 'ed-image-status ok';
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'ed-image-status'; }, 2500);
  } catch (err) {
    statusEl.textContent = '✗ ' + err.message;
    statusEl.className = 'ed-image-status err';
  } finally {
    input.value = '';
  }
}

// ── Section renderers ─────────────────────────────────────────────────────────

function renderNav() {
  const keys = ['about', 'history', 'tech', 'services', 'markets', 'trust', 'video', 'contact'];
  return section('nav', 'Navigation',
    `<div class="ed-grid-nav">${keys.map(k => F(`nav.${k}`, k)).join('')}</div>`
  );
}

function renderHero() {
  return section('hero', 'Hero — Accroche principale', `
    <div class="ed-grid-2">
      ${ImgField('logo', { target: 'assets/logo-blanc.png', note: 'Utilisé aussi dans la nav et le pied de page.' })}
      ${ImgField('image de fond', { target: 'assets/hero-bg.jpg', note: 'Utilisée aussi en poster de la vidéo.' })}
    </div>
    ${F('hero.tagline',  'tagline ligne 1', 'hero-text')}
    ${F('hero.tagline2', 'tagline ligne 2', 'hero-text')}
    ${F('hero.cta',      'bouton CTA')}
  `);
}

function renderAbout() {
  return section('about', 'À propos', `
    ${F('about.label',           'label section',  'sec-label')}
    ${F('about.title',           'titre',          'sec-title')}
    ${F('about.text1',           'paragraphe 1',   'multiline muted')}
    ${F('about.text2',           'paragraphe 2',   'multiline muted')}
    <div class="ed-grid-2">
      ${ImgField('photo atelier 1', { target: 'assets/atelier-1.png' })}
      ${ImgField('photo atelier 2', { target: 'assets/atelier-2.png' })}
    </div>
    ${F('about.atelier_caption', 'légende photo',  'muted small')}
  `);
}

function renderHistory() {
  const items = data.history[lang].items;

  const cards = items.map((item, i) => {
    const eventEls = (item.events || []).map((_, j) => `
      <div style="display:flex;align-items:flex-start;gap:6px">
        ${E(`history.items.${i}.events.${j}`, 'muted small')}
        <button class="btn-remove-tag" style="position:static;display:flex;flex-shrink:0" onclick="removeHistoryEvent(${i},${j})" title="Supprimer">×</button>
      </div>`).join('');

    return `
      <div class="ed-card" style="position:relative">
        <button class="btn-remove-card" onclick="removeHistoryItem(${i})" title="Supprimer cette étape">×</button>
        ${F(`history.items.${i}.year`, 'année', 'card-value small')}
        <div class="ed-field">
          <label class="ed-label">événements (${(item.events || []).length})</label>
          <div style="display:flex;flex-direction:column;gap:6px">${eventEls}</div>
          <button class="btn-add" onclick="addHistoryEvent(${i})" style="margin-top:6px">+ Ajouter un événement</button>
        </div>
      </div>`;
  }).join('');

  return section('history', 'Histoire', `
    ${F('history.label',    'label section', 'sec-label')}
    ${F('history.title',    'titre',         'sec-title')}
    ${F('history.subtitle', 'sous-titre',    'muted')}
    ${cards}
    <button class="btn-add" onclick="addHistoryItem()">+ Ajouter une année</button>
  `);
}

function renderTech() {
  const adv = data.tech[lang].advantages;
  const cards = adv.map((_, i) => `
    <div class="ed-card">
      ${F(`tech.advantages.${i}.value`, 'valeur',      'card-value')}
      ${F(`tech.advantages.${i}.label`, 'label',       'card-title')}
      ${F(`tech.advantages.${i}.desc`,  'description', 'multiline muted small')}
    </div>`).join('');

  return section('tech', 'Technologie U-PIN', `
    ${F('tech.label',           'label section',    'sec-label')}
    ${F('tech.title',           'titre',            'sec-title')}
    ${F('tech.intro',           'intro',            'multiline muted')}
    <div class="ed-grid-2">
      <div>
        ${ImgField('image U-PIN', { target: 'assets/tech-upin.jpg' })}
        ${F('tech.compare_upin',  'colonne U-PIN')}
      </div>
      <div>
        ${ImgField('image fil rond', { target: 'assets/bobinage-comparaison.png' })}
        ${F('tech.compare_round', 'colonne fil rond')}
      </div>
    </div>
    ${F('tech.advantages_title', 'titre avantages', 'sec-title')}
    <div class="ed-grid-3">${cards}</div>
  `);
}

function renderServices() {
  const items  = data.services[lang].items;
  const extras = data.services[lang].extra;

  const cards = items.map((_, i) => `
    <div class="ed-card">
      ${ImgField('image', { jsonPath: `services.items.${i}.img` })}
      ${F(`services.items.${i}.title`, 'titre',       'card-title')}
      ${F(`services.items.${i}.desc`,  'description', 'multiline muted small')}
    </div>`).join('');

  const tagEls = extras.map((_, i) => `
    <div class="ed-tag-wrap">
      ${E(`services.extra.${i}`, 'tag')}
      <button class="btn-remove-tag" onclick="removeServiceExtra(${i})" title="Supprimer">×</button>
    </div>`).join('');

  return section('services', 'Services', `
    ${F('services.label',       'label section', 'sec-label')}
    ${F('services.title',       'titre',         'sec-title')}
    ${F('services.subtitle',    'sous-titre',    'muted')}
    <div class="ed-grid-3">${cards}</div>
    ${F('services.extra_title', 'titre liste prestations')}
    <div class="ed-field">
      <label class="ed-label">prestations (${extras.length} éléments)</label>
      <div class="ed-tags">
        ${tagEls}
        <button class="btn-add" onclick="addServiceExtra()">+ Ajouter</button>
      </div>
    </div>
  `);
}

function renderMarkets() {
  const items = data.markets[lang].items;

  const cards = items.map((item, i) => {
    const tagEls = (item.tags || []).map((_, j) => E(`markets.items.${i}.tags.${j}`, 'tag')).join('');
    return `
      <div class="ed-card">
        ${ImgField('image', { jsonPath: `markets.items.${i}.img` })}
        ${F(`markets.items.${i}.title`,  'titre',       'card-title')}
        ${F(`markets.items.${i}.metric`, 'métrique',    'card-value small')}
        ${F(`markets.items.${i}.desc`,   'description', 'multiline muted small')}
        <div class="ed-field">
          <label class="ed-label">tags</label>
          <div class="ed-tags">${tagEls}</div>
        </div>
      </div>`;
  }).join('');

  return section('markets', 'Marchés', `
    ${F('markets.label',    'label section', 'sec-label')}
    ${F('markets.title',    'titre',         'sec-title')}
    ${F('markets.subtitle', 'sous-titre',    'muted')}
    <div class="ed-grid-3">${cards}</div>
  `);
}

function renderTrust() {
  const partners = data.trust[lang].partners;
  const logos = partners.map((_, i) => `
    <div class="ed-card" style="position:relative">
      <button class="btn-remove-card" onclick="removeTrustLogo(${i})" title="Supprimer ce logo">×</button>
      ${ImgField(`logo ${i + 1}`, { jsonPath: `trust.partners.${i}.img` })}
    </div>`).join('');

  return section('trust', 'Confiance / Partenaires', `
    ${F('trust.label',    'label section', 'sec-label')}
    ${F('trust.title',    'titre',         'sec-title')}
    ${F('trust.subtitle', 'sous-titre',    'multiline muted')}
    <div class="ed-grid-3">${logos}</div>
    <button class="btn-add" onclick="addTrustLogo()">+ Ajouter un logo</button>
  `);
}

function renderVideo() {
  return section('video', 'Vidéo', `
    ${F('video.label',    'label section', 'sec-label')}
    ${F('video.title',    'titre',         'sec-title')}
    ${F('video.subtitle', 'sous-titre',    'muted')}
    <p class="ed-note">Le poster de la vidéo utilise l'image de fond du Hero (voir section Hero). La vidéo elle-même (assets/video.mp4) n'est pas remplaçable ici.</p>
  `);
}

function renderContact() {
  const contacts = data.contact[lang].contacts;

  const cards = contacts.map((_, i) => `
    <div class="ed-card" style="position:relative">
      <button class="btn-remove-card" onclick="removeContact(${i})" title="Supprimer ce contact">×</button>
      <div class="ed-grid-2">
        ${F(`contact.contacts.${i}.name`,  'nom',       'card-title')}
        ${F(`contact.contacts.${i}.role`,  'rôle',      'muted')}
      </div>
      <div class="ed-grid-2">
        ${F(`contact.contacts.${i}.email`, 'email',     'muted small')}
        ${F(`contact.contacts.${i}.phone`, 'téléphone', 'muted small')}
      </div>
    </div>`).join('');

  return section('contact', 'Contact', `
    ${F('contact.label',        'label section', 'sec-label')}
    ${F('contact.title',        'titre',         'sec-title')}
    ${F('contact.subtitle',     'sous-titre',    'muted')}
    <div class="ed-grid-2">
      ${F('contact.address_label', 'libellé adresse')}
      ${F('contact.address',       'adresse',       'multiline')}
    </div>
    ${cards}
    <button class="btn-add" onclick="addContact()">+ Ajouter un contact</button>
  `);
}

function renderFooter() {
  return section('footer', 'Pied de page', `
    ${F('footer.legal',   'mentions légales', 'muted small')}
    ${F('footer.tagline', 'tagline',          'muted')}
  `);
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  const root = document.getElementById('editor-root');
  root.innerHTML = [
    renderNav(),
    renderHero(),
    renderAbout(),
    renderHistory(),
    renderTech(),
    renderServices(),
    renderMarkets(),
    renderTrust(),
    renderVideo(),
    renderContact(),
    renderFooter()
  ].join('');

  // Populate text (innerText handles \n correctly with pre-wrap)
  root.querySelectorAll('[data-path]').forEach(el => {
    el.innerText = String(getVal(el.dataset.path) ?? '');
  });

  // Populate images whose path comes from content.json (services, marchés, partenaires)
  root.querySelectorAll('[data-img-json-path]').forEach(el => {
    const target = String(getVal(el.dataset.imgJsonPath) ?? '');
    el.dataset.target = target;
    if (target) el.querySelector('.ed-image-thumb').src = bust(target);
  });

  // Events
  root.querySelectorAll('[data-path]').forEach(el => {
    el.addEventListener('input', () => {
      let val = el.innerText;
      // Remove trailing newline browsers sometimes append
      if (!el.classList.contains('multiline')) val = val.replace(/\n/g, '').trim();
      setVal(el.dataset.path, val);
    });

    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !el.classList.contains('multiline')) {
        e.preventDefault();
      }
    });

    // Paste plain text only
    el.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });
}

function setLang(l) {
  lang = l;
  render();
}

function removeContact(i) {
  data.contact[lang].contacts.splice(i, 1);
  markDirty();
  render();
}

function addContact() {
  data.contact[lang].contacts.push({ name: '', role: '', email: '', phone: '' });
  markDirty();
  render();
  const cards = document.querySelectorAll('#ed-contact .ed-card');
  if (cards.length) cards[cards.length - 1].querySelector('.editable').focus();
}

function removeHistoryItem(i) {
  data.history[lang].items.splice(i, 1);
  markDirty();
  render();
}

function addHistoryItem() {
  data.history[lang].items.push({ year: '', events: [] });
  markDirty();
  render();
  const cards = document.querySelectorAll('#ed-history .ed-card');
  if (cards.length) cards[cards.length - 1].querySelector('.editable').focus();
}

function removeHistoryEvent(i, j) {
  data.history[lang].items[i].events.splice(j, 1);
  markDirty();
  render();
}

function addHistoryEvent(i) {
  data.history[lang].items[i].events.push('');
  markDirty();
  render();
  const cards = document.querySelectorAll('#ed-history .ed-card');
  const card = cards[i];
  if (card) {
    const eventEls = card.querySelectorAll('.editable');
    if (eventEls.length) eventEls[eventEls.length - 1].focus();
  }
}

function removeTrustLogo(i) {
  // Les logos partenaires sont identiques en FR/EN : on garde les deux langues synchronisées.
  data.trust.fr.partners.splice(i, 1);
  data.trust.en.partners.splice(i, 1);
  markDirty();
  render();
}

function addTrustLogo() {
  const entry = { name: '', img: `assets/logos/logo-${Date.now()}.png` };
  data.trust.fr.partners.push({ ...entry });
  data.trust.en.partners.push({ ...entry });
  markDirty();
  render();
  const cards = document.querySelectorAll('#ed-trust .ed-card');
  if (cards.length) cards[cards.length - 1].querySelector('.btn-add').click();
}

function removeServiceExtra(i) {
  data.services[lang].extra.splice(i, 1);
  markDirty();
  render();
}

function addServiceExtra() {
  data.services[lang].extra.push('');
  markDirty();
  render();
  // Focus le nouvel élément
  const tags = document.querySelectorAll('#ed-services .ed-tags .editable.tag');
  if (tags.length) tags[tags.length - 1].focus();
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const r = await fetch('content.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
    render();
  } catch (e) {
    document.getElementById('editor-root').innerHTML = `
      <div class="ed-error">
        <strong>Impossible de charger content.json</strong>
        <p>${e.message}</p>
        <p style="margin-top:16px">Assurez-vous de lancer <code>python editor_server.py</code><br>
        puis d'ouvrir <code>http://localhost:8080/editor.html</code></p>
      </div>`;
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
});

window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

init();
</script>
</body>
